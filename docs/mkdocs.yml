# NeMo Retriever documentation — single MkDocs config for NVIDIA docs and GitHub Pages.
# Flat numbered nav (sections 1–13) drives the NRL TOC everywhere.
#
# Local setup (once, from repository root):
#   pip install -r docs/requirements.txt
#   pip install -e ./nemo_retriever
#
# Local build (strict; from docs/):
#   cd docs && mkdocs build -f mkdocs.yml --strict
#   (mkdocs.nrl-github-pages.yml was removed; use mkdocs.yml only)
# Output: docs/site/ (static HTML; open site/index.html or serve the folder).
#
# GitHub Pages: .github/workflows/nrl-docs-github-pages.yml runs the same command after
# actions/configure-pages sets SITE_URL, then uploads docs/site as the Pages artifact.
# Locally, omit SITE_URL to use the default site_url below.

site_name: NeMo Retriever Documentation
site_description: NeMo Retriever documentation — library, deployment, and operations guides
site_url: !ENV [SITE_URL, "https://docs.nvidia.com/nemo/retriever/"]

repo_name: NVIDIA/NeMo-Retriever
repo_url: https://github.com/NVIDIA/NeMo-Retriever

theme:
  name: material
  custom_dir: overrides
  features:
    - content.code.annotate
    - navigation.indexes
    - navigation.instant
    - navigation.path
    - navigation.instant.prefetch
    - navigation.top
    - navigation.footer
    - navigation.expand
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  font:
    code: Roboto Mono
  favicon: assets/images/favicon.png
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: light
      primary: custom
      accent: lime
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: dark
      primary: custom
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    logo: nvidia/nvidia-logo
    repo: fontawesome/brands/github

extra_css:
  - assets/css/color-schemes.css
  - assets/css/fonts.css
  - assets/css/custom-material.css
  - assets/css/jupyter-themes.css
#  - assets/css/chatbot.css

# extra_javascript:
#   - assets/js/chatbot.js

# Flat numbered sections so the left sidebar shows the full TOC; Material hides the tab
# bar when there is only one top-level tab.
nav:
  - "1. Introduction":
      - "What is NeMo Retriever?": extraction/overview.md
      - Key concepts: extraction/concepts.md
      - Release notes: extraction/releasenotes.md
  - "2. Get started":
      - About this section: extraction/getting-started-about.md
      - Prerequisites: extraction/prerequisites.md
      - "Hardware and support matrix": extraction/support-matrix.md
      - "Quickstart: NeMo Retriever Library": https://github.com/NVIDIA/NeMo-Retriever/tree/main/nemo_retriever
      - "Authentication and API keys": extraction/api-keys.md
  - "3. Deployment options": extraction/deployment-options.md
  - "4. Core workflows":
      - "Workflow: Ingest documents into a searchable VDB collection": extraction/workflow-document-ingestion.md
      - "Workflow: Audio & Video Ingestion":
          - "Speech and audio extraction": extraction/audio-video.md
          - "OCR of video frames": extraction/workflow-video-ocr.md
  - "5. Multimodal extraction":
      - "Supported file types and formats": extraction/supported-file-types.md
      - "Text and layout extraction": extraction/text-layout-extraction.md
      - Tables: extraction/extraction-tables.md
      - "Charts and infographics": extraction/extraction-charts-infographics.md
      - "OCR and scanned documents": extraction/extraction-ocr-scanned.md
      - Image captioning: extraction/image-captioning.md
      - "Metadata and content schema": extraction/multimodal-metadata-schema.md
      - "Extraction limitations and quality": extraction/throughput-is-dataset-dependent.md
  - "6. Embedding, indexing & storage":
      - "Embedding NIMs and models": extraction/embedding-nims-models.md
      - "Multimodal embeddings (VLM)": extraction/embedding.md
      - Vector databases: extraction/vdbs.md
      - "Chunking and splitting": extraction/chunking.md
  - "7. Retrieval & ranking":
      - "Semantic and hybrid retrieval": extraction/semantic-hybrid-retrieval.md
      - "Custom metadata and filtering": extraction/custom-metadata.md
      - "Agentic retrieval (concept)": extraction/agentic-retrieval-concept.md
  - "8. Deployment & operations":
      - "Ray and distributed ingest": extraction/ray-logging.md
      - "Telemetry and observability": extraction/telemetry.md
  - "9. Customize & extend":
      - User-defined functions: extraction/user-defined-functions.md
      - User-defined stages: extraction/user-defined-stages.md
      - "NimClient and custom NIM endpoints": extraction/nimclient.md
  - "10. Integrations & ecosystem":
      - "Framework integrations": extraction/integrations-langchain-llamaindex-haystack.md
      - "Vector database partners": extraction/vector-db-partners.md
      - "Starter kits": extraction/notebooks.md
  - "11. Evaluation & benchmarks":
      - "Evaluate on your own documents": extraction/evaluate-on-your-data.md
  - "12. Reference":
      - "API guide": extraction/nemo-retriever-api-reference.md
      # TODO: after nv-ingest code removal, update this link when CLI docs are relocated.
      - "CLI reference": https://github.com/NVIDIA/NeMo-Retriever/tree/main/nemo_retriever/docs/cli
      - Environment variables: extraction/environment-config.md
      - "Metadata reference": extraction/content-metadata.md
  - "13. Support & community":
      - Troubleshooting: extraction/troubleshoot.md
      - FAQ: extraction/faq.md
      - Contributing: extraction/contributing.md
  - Additional resources:
      - "OSS licences": license.md

plugins:
  - search
  # uncomment below to grab api
  # - gen-files:
  #     scripts:
  #       - scripts/gen_ref_pages.py
  - macros
  - mike:
      alias_type: copy
      canonical_version: "latest"
      version_selector: true
      css_dir: assets/css
      javascript_dir: assets/js
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_if_no_docstring: true
          paths:
            - ../api/src
            - ../nemo_retriever/src
  - mkdocs-jupyter:
      theme: auto
      highlight_extra_classes: "jupyter-notebook"
  - redirects:
      redirect_maps:
        index.md: extraction/overview.md
        extraction/index.md: extraction/overview.md
        # TODO: after nv-ingest code removal, update this link when CLI docs are relocated.
        extraction/nv-ingest_cli.md: https://github.com/NVIDIA/NeMo-Retriever/tree/main/nemo_retriever/docs/cli
        extraction/helm.md: extraction/deployment-options.md
        extraction/quickstart-guide.md: extraction/deployment-options.md
        extraction/choose-your-path.md: extraction/deployment-options.md
        extraction/hosted-nims-when-to-use.md: extraction/deployment-options.md
        extraction/releasenotes-nv-ingest.md: extraction/releasenotes.md
        extraction/ngc-api-key.md: extraction/api-keys.md
        extraction/data-store.md: extraction/vdbs.md
        extraction/nemoretriever-parse.md: extraction/text-layout-extraction.md
        extraction/vlm-embed.md: extraction/embedding.md
        extraction/audio.md: extraction/audio-video.md
        extraction/workflow-agentic-retrieval.md: extraction/agentic-retrieval-concept.md
        extraction/workflow-build-searchable-collection.md: extraction/workflow-document-ingestion.md
        extraction/workflow-query-rerank.md: extraction/semantic-hybrid-retrieval.md
  - site-urls

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets:
      check_paths: true
      restrict_base_path: false
      base_path: "."
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - overrides/.icons
  - def_list
  - admonition
  - footnotes

# MkDocs 1.6+: exclude suite landing and legacy duplicate pages (still in repo for parity).
exclude_docs: |
  index.md
  extraction/helm.md
  extraction/quickstart-guide.md
  extraction/choose-your-path.md
  extraction/hosted-nims-when-to-use.md
  extraction/workflow-e2e-blueprints.md
  extraction/releasenotes-nv-ingest.md
  extraction/workflow-agentic-retrieval.md
  extraction/workflow-build-searchable-collection.md
  extraction/workflow-query-rerank.md
  extraction/performance_guide.md

extra:
  generator: false
  version:
    provider: mike
    default: latest
    alias: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NVIDIA/NeMo-Retriever/

copyright: |
  &copy; Copyright 2023-2026 NVIDIA CORPORATION & AFFILIATES. All rights reserved.
