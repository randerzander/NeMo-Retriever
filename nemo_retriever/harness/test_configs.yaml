# Harness config for nemo_retriever benchmarks.

active:
  dataset: jp20
  preset: single_gpu
  query_csv: data/jp20_query_gt.csv
  input_type: pdf
  recall_required: true
  recall_match_mode: pdf_page
  recall_adapter: none
  evaluation_mode: recall
  beir_loader: null
  beir_dataset_name: null
  beir_split: test
  beir_query_language: null
  beir_doc_id_field: pdf_basename
  beir_ks: [1, 3, 5, 10]
  artifacts_dir: null
  ray_address: null
  lancedb_uri: lancedb
  hybrid: false
  embed_model_name: nvidia/llama-nemotron-embed-1b-v2
  embed_modality: text
  embed_granularity: element
  extract_page_as_image: false
  extract_infographics: false
  write_detection_file: false
  store_images_uri: null
  store_text: false
  strip_base64: true

presets:
  single_gpu:
    pdf_extract_workers: 8
    pdf_extract_num_cpus: 2.0
    pdf_extract_batch_size: 4
    pdf_split_batch_size: 1
    page_elements_batch_size: 4
    page_elements_workers: 3
    ocr_workers: 3
    ocr_batch_size: 16
    embed_workers: 3
    embed_batch_size: 256
    page_elements_cpus_per_actor: 1.0
    ocr_cpus_per_actor: 1.0
    embed_cpus_per_actor: 1.0
    gpu_page_elements: 0.1
    gpu_ocr: 0.1
    gpu_embed: 0.25

  dgx_8gpu:
    pdf_extract_workers: 64
    pdf_extract_num_cpus: 2.0
    pdf_extract_batch_size: 4
    pdf_split_batch_size: 1
    page_elements_batch_size: 32
    page_elements_workers: 24
    ocr_workers: 24
    ocr_batch_size: 16
    embed_workers: 24
    embed_batch_size: 256
    page_elements_cpus_per_actor: 1.0
    ocr_cpus_per_actor: 1.0
    embed_cpus_per_actor: 1.0
    gpu_page_elements: 0.1
    gpu_ocr: 0.1
    gpu_embed: 0.25

datasets:
  bo20:
    path: /datasets/nv-ingest/bo20
    query_csv: null
    input_type: pdf
    recall_required: false

  bo767:
    path: /datasets/nv-ingest/bo767
    query_csv: data/bo767_query_gt.csv
    input_type: pdf
    recall_required: true

  jp20:
    path: /datasets/nv-ingest/jp20
    query_csv: data/jp20_query_gt.csv
    input_type: pdf
    recall_required: true
    recall_match_mode: pdf_page
    recall_adapter: none

  earnings:
    path: /datasets/nv-ingest/earnings_consulting
    query_csv: data/earnings_consulting_multimodal.csv
    input_type: pdf
    recall_required: true
    recall_match_mode: pdf_page
    recall_adapter: page_plus_one

  # Wiring for bo10k-style CSVs with zero-based page numbers.
  # Keep recall optional by default until a local query CSV path is configured.
  bo10k:
    path: /datasets/nv-ingest/bo10k
    query_csv: null
    input_type: pdf
    recall_required: false
    recall_match_mode: pdf_page
    recall_adapter: page_plus_one

  # FinanceBench is document-level recall using the repository fixture JSON.
  financebench:
    path: /datasets/nv-ingest/financebench
    query_csv: data/financebench_train.json
    input_type: pdf
    recall_required: true
    recall_match_mode: pdf_only
    recall_adapter: financebench_json

  audio_retrieval:
    path: /datasets/nv-ingest/audio_retrieval_data_mp3
    query_csv: /datasets/nv-ingest/video_retrieval_eval_gt_audio_only.csv
    input_type: audio
    segment_audio: true
    audio_split_type: time
    audio_split_interval: 36000
    recall_required: true
    recall_match_mode: audio_segment
    recall_adapter: none
    audio_match_tolerance_secs: 2.0
    embed_model_name: nvidia/llama-nemotron-embed-1b-v2
    embed_modality: text
    embed_granularity: element

  vidore_v3_computer_science:
    path: /datasets/nv-ingest/vidore_v3_corpus_pdf/vidore_v3_computer_science
    query_csv: null
    recall_required: false
    recall_match_mode: pdf_page
    recall_adapter: none
    evaluation_mode: beir
    beir_loader: vidore_hf
    beir_dataset_name: vidore_v3_computer_science
    beir_doc_id_field: pdf_basename
    embed_model_name: nvidia/llama-nemotron-embed-vl-1b-v2
    embed_modality: text_image
    embed_granularity: page
    extract_page_as_image: true
    extract_infographics: true

